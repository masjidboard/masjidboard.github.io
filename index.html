<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>تحفۃ الباری</title>
    <style>
        /* 🎨 فونٹ اور بنیادی تھیم */
        @font-face {
            font-family: 'AlQalam';
            src: url('Al Qalam Quran Majeed Web Regular.ttf'); /* فائل کا نام وہی رکھیں جو اپلوڈ کی ہے */
        }
        @font-face {
            font-family: 'Jameel Noori';
            src: local('Jameel Noori Nastaleeq'), local('Urdu Typesetting');
        }

        :root {
            --bg-color: #FDF8ED; --text-primary: #3D2B0F; --text-secondary: #8B6A3A;
            --card-bg: #FFFFFF; --nav-bg: #F0E6D2; --primary-color: #8B4513;
            --urdu-font-size: 22px; --arabic-font-size: 28px;
        }

        [data-theme="dark"] {
            --bg-color: #121A2F; --text-primary: #C8DFF0; --text-secondary: #5A84A8;
            --card-bg: #1B2640; --nav-bg: #0D1424; --primary-color: #C9B070;
        }

        body {
            margin: 0; padding: 0; background-color: var(--bg-color);
            color: var(--text-primary); font-family: 'Jameel Noori', serif;
            display: flex; flex-direction: column; height: 100vh; overflow: hidden;
        }

        /* 📱 ریسپونسیو کنٹینر (موبائل پر کٹے گا نہیں) */
        #main-app { display: none; flex-direction: column; height: 100%; position: relative; }
        
        header { 
            background: var(--nav-bg); padding: 10px 15px; text-align: center; 
            font-size: 22px; font-weight: bold; color: var(--primary-color);
            display: flex; justify-content: space-between; align-items: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1); z-index: 10;
        }

        .content-area { 
            flex: 1; padding: 15px; overflow-y: auto; 
            padding-bottom: 80px; /* نیچے کے مینو کے لیے جگہ */
            text-align: justify; /* الائمنٹ جسٹی فائی */
        }

        /* 📖 کتاب کا متن اور آئیکنز */
        .urdu-text { font-size: var(--urdu-font-size); line-height: 1.8; margin-bottom: 20px; }
        .arabic-text { font-family: 'AlQalam', serif; font-size: var(--arabic-font-size); color: var(--primary-color); line-height: 1.6; }

        .page-header-tools {
            display: flex; justify-content: space-between; background: var(--nav-bg);
            padding: 8px 12px; border-radius: 8px; margin-bottom: 15px;
        }

        /* 🔘 فکسڈ نیچے کا مینو (PC اور موبائل دونوں پر نظر آئے گا) */
        .bottom-nav {
            position: fixed; bottom: 0; left: 0; width: 100%;
            background-color: var(--nav-bg); display: flex; justify-content: space-around;
            padding: 10px 0; box-shadow: 0 -3px 10px rgba(0,0,0,0.1); z-index: 100;
        }
        .nav-item { text-align: center; color: var(--text-secondary); cursor: pointer; flex: 1; font-size: 16px; }
        .nav-item.active { color: var(--primary-color); font-weight: bold; }

        /* 🔍 سرچ سسٹم ڈیزائن */
        .search-options { background: var(--card-bg); padding: 10px; border-radius: 8px; margin-bottom: 10px; display: flex; flex-wrap: wrap; gap: 10px; font-size: 14px; }
        .search-box { display: flex; gap: 5px; margin-bottom: 15px; }
        .search-box input { flex: 1; padding: 10px; border-radius: 5px; border: 1px solid var(--text-secondary); font-family: 'Jameel Noori'; }

        /* سپلیش اسکرین وہی رہے گی جو ہم نے پہلے سیٹ کی تھی */
        #splash-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg-color); z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; transition: 0.5s; }
    </style>
</head>
<body>

    <div id="splash-screen">
        <h1 style="font-size: 50px; color: var(--primary-color);">تُحْفَةُ الْبَارِي</h1>
        <p style="font-size: 24px;">مؤلف: شیخ الحدیث مولانا محمد ابراہیم خطیب حفظہ اللہ</p>
        <button onclick="enterApp()" style="padding: 15px 40px; font-size: 22px; background: var(--primary-color); color: white; border: none; border-radius: 10px; cursor: pointer; font-family: 'Jameel Noori';">کتاب شروع کریں</button>
        <div style="margin-top: 50px; font-size: 22px; font-weight: bold;">تیار کردہ: مفتی اظہر بن محمد امین پٹیل</div>
    </div>

    <div id="main-app">
        <header>
            <span id="app-header">تحفۃ الباری</span>
            <button onclick="jumpToPDFCurrent()" style="background:#D32F2F; color:white; border:none; padding:5px 12px; border-radius:5px; cursor:pointer;">📄 اصل صفحہ</button>
        </header>

        <div class="content-area">
            <div id="tab-book" class="tab-content active">
                <div class="page-header-tools">
                    <button onclick="prevPage()">➡ پچھلا</button>
                    <span id="page-indicator">جلد: 1 | صفحہ: 1</span>
                    <button onclick="nextPage()">اگلا ⬅</button>
                    <button onclick="saveBookmark()" style="background:none; border:1px solid; border-radius:4px;">🔖</button>
                </div>
                <div id="book-content-area" class="urdu-text"></div>
            </div>

            <div id="tab-search" class="tab-content">
                <div class="search-options">
                    <label><input type="radio" name="searchMode" value="any" checked> بعض کلمات</label>
                    <label><input type="radio" name="searchMode" value="all"> کل کلمات</label>
                    <label><input type="radio" name="searchMode" value="exact"> جملہ (متتالیہ)</label>
                </div>
                <div class="search-box">
                    <input type="text" id="searchInput" placeholder="یہاں تلاش کریں...">
                    <button onclick="runSearch()" style="background:var(--primary-color); color:white; border:none; padding:0 15px; border-radius:5px;">تلاش</button>
                </div>
                <div id="searchResults"></div>
            </div>

            <div id="tab-bookmarks" class="tab-content">
                <div id="bookmarksList"></div>
            </div>

            <div id="tab-settings" class="tab-content">
                <div style="background:var(--card-bg); padding:15px; border-radius:10px;">
                    <p>ڈارک موڈ: <input type="checkbox" id="darkModeToggle"></p>
                    <p>اردو فونٹ: <button onclick="changeFontSize('urdu', -2)">-</button> <span id="uSize">22</span> <button onclick="changeFontSize('urdu', 2)">+</button></p>
                    <p>عربی فونٹ: <button onclick="changeFontSize('arabic', -2)">-</button> <span id="aSize">28</span> <button onclick="changeFontSize('arabic', 2)">+</button></p>
                </div>
            </div>
        </div>

        <div class="bottom-nav">
            <div class="nav-item active" onclick="switchTab('book', this)">📖 کتاب</div>
            <div class="nav-item" onclick="switchTab('search', this)">🔍 تلاش</div>
            <div class="nav-item" onclick="switchTab('bookmarks', this)">🔖 محفوظ</div>
            <div class="nav-item" onclick="switchTab('settings', this)">⚙️ ترتیبات</div>
        </div>
    </div>

    <script>
        let bookData = [];
        let currentIndex = 0;

        // 🟢 1. نارملائزیشن فنکشن (اعراب ہٹانا)
        function normalizeText(text) {
            return text.replace(/[ًٌٍَُِّْـ]/g, "")
                       .replace(/[أإآ]/g, "ا")
                       .replace(/ى/g, "ي")
                       .replace(/[ةھ]/g, "ه");
        }

        // 🟢 2. پی ڈی ایف میپنگ لاجک
        function getPDFPage(vol, pageNum) {
            // مفتی صاحب کے دیے ہوئے اعداد و شمار
            if (vol == 1) return (pageNum - 20) + 20; // جلد 1: 20 سے شروع
            if (vol == 2) return (pageNum - 30) + 493; // جلد 2: 493 سے شروع (صفحہ 30 سے)
            if (vol == 3) return (pageNum - 2) + 723;  // جلد 3: 723 سے شروع (صفحہ 2 سے)
            return 1;
        }

        // JSON لوڈ کرنا
        fetch('book_data.json').then(r => r.json()).then(data => {
            bookData = data;
            renderPage(0);
        });

        function renderPage(index) {
            if (index < 0 || index >= bookData.length) return;
            currentIndex = index;
            const item = bookData[index];
            let html = item.content.replace(/<ar>/g, '<span class="arabic-text">').replace(/<\/ar>/g, '</span>');
            document.getElementById('book-content-area').innerHTML = html;
            document.getElementById('page-indicator').innerText = `جلد: ${item.volume} | صفحہ: ${item.page_number}`;
            document.querySelector('.content-area').scrollTop = 0;
        }

        // سرچ سسٹم
        function runSearch() {
            const query = document.getElementById('searchInput').value.trim();
            const mode = document.querySelector('input[name="searchMode"]:checked').value;
            const resultsBox = document.getElementById('searchResults');
            resultsBox.innerHTML = "";
            if (!query) return;

            const nQuery = normalizeText(query);
            const words = nQuery.split(" ");

            const filtered = bookData.filter(item => {
                const nContent = normalizeText(item.content);
                if (mode === "any") return words.any(w => nContent.includes(w));
                if (mode === "all") return words.every(w => nContent.includes(w));
                if (mode === "exact") return nContent.includes(nQuery);
            });

            filtered.forEach(res => {
                const div = document.createElement('div');
                div.style = "background:var(--card-bg); padding:10px; margin-bottom:10px; border-radius:5px; cursor:pointer;";
                div.innerHTML = `<strong>${res.chapter_h1}</strong><br><small>جلد: ${res.volume} | صفحہ: ${res.page_number}</small>`;
                div.onclick = () => { renderPage(bookData.indexOf(res)); switchTab('book'); };
                resultsBox.appendChild(div);
            });
        }

        function jumpToPDFCurrent() {
            const item = bookData[currentIndex];
            const pdfPage = getPDFPage(item.volume, item.page_number);
            window.open(`https://masjidboard.github.io/Tohfat%20ul%20Bari%20Complete.pdf#page=${pdfPage}`, "_blank");
        }

        // دیگر فنکشنز (بک مارک، ٹیب، فونٹ) پرانے ہی رہیں گے لیکن بہتر الائمنٹ کے ساتھ
        function enterApp() { document.getElementById('splash-screen').style.opacity = '0'; setTimeout(() => { document.getElementById('splash-screen').style.display='none'; document.getElementById('main-app').style.display='flex'; }, 500); }
        function switchTab(id, el) { 
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.getElementById('tab-'+id).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            if(el) el.classList.add('active');
        }
        function nextPage() { renderPage(currentIndex + 1); }
        function prevPage() { renderPage(currentIndex - 1); }

        Array.prototype.any = function(func) { return this.some(func); }; // Helper
    </script>
</body>
</html>
